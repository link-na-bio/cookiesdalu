<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookies da Lu</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="wp-content/uploads/2025/06/logomarca.png">

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2A100B;
            color: #ffffff;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 0 40px 0;
            /* No padding at top to touch header */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Logo */
        .logo {
            max-width: 150px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        /* Buttons Grid */
        .links-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            /* Increased gap for blur effect room */
        }

        .header-image-container .link-image {
            border-radius: 0 0 12px 12px;
            /* Top corners touch the edge */
        }



        .link-item {
            display: block;
            width: 100%;
            text-decoration: none;
        }

        .link-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .link-item:hover .link-image {
            transform: scale(1.03);
        }

        /* Social Image Overlay (Image 6) */
        .image-overlay-container {
            position: relative;
            width: 100%;
        }

        .social-overlay {
            position: absolute;
            top: 43%;
            left: 31%;
            width: 63%;
            height: 43%;
            z-index: 10;
        }

        .social-link {
            position: absolute;
            display: block;
            /* background: rgba(255, 0, 0, 0.2); /* For debugging positions */
            text-decoration: none;
        }

        .social-link.instagram { top: 0; left: 16%; width: 28%; height: 45%; }
        .social-link.whatsapp { top: 0; left: 50%; width: 33%; height: 45%; }
        .social-link.tiktok { top: 52%; left: 1%; width: 29%; height: 45%; }
        .social-link.facebook { top: 52%; left: 33%; width: 28%; height: 45%; }
        .social-link.youtube { top: 52%; left: 63%; width: 33%; height: 45%; }

        /* Animations */
        .observe-animation {
            opacity: 0;
            will-change: transform, opacity;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(-60px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-fadeUp {
            animation: fadeUp 0.8s ease forwards;
        }

        .animate-slideLeft {
            animation: slideLeft 0.8s ease forwards;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="links-grid">
            <div class="header-image-container">
                <img src="1.png" alt="Cabeçalho" class="link-image" style="border-radius: 0;">
            </div>
            <div style="padding: 0 20px; display: flex; flex-direction: column; gap: 20px;">
                <!-- Wrap remaining items for side padding -->
                <a href="https://wa.me/5561985103316" class="link-item observe-animation" data-animation="slideLeft"
                    style="animation-delay: 0.1s;">
                    <img src="2.png" alt="Botão 2" class="link-image">
                </a>
                <a href="https://www.whatsapp.com/catalog/556185103316/?app_absent=0" class="link-item observe-animation" data-animation="slideLeft"
                    style="animation-delay: 0.2s;">
                    <img src="3.png" alt="Botão 3" class="link-image">
                </a>
                <a href="https://pay.hotmart.com/T87285610M?bid=1734268241715" class="link-item observe-animation" data-animation="slideLeft"
                    style="animation-delay: 0.3s;">
                    <img src="4.png" alt="Botão 4" class="link-image">
                </a>
                <a href="./cardapio-pascoa.html" class="link-item observe-animation" data-animation="slideLeft"
                    style="animation-delay: 0.4s;">
                    <img src="5.png" alt="Botão 5" class="link-image">
                </a>
                <div class="image-overlay-container link-item observe-animation" data-animation="slideLeft" style="animation-delay: 0.5s;">
                    <img src="6.png" alt="Nossas Redes Sociais" class="link-image">
                    <div class="social-overlay">
                        <a href="https://www.instagram.com/cookiesdalu.ofc/" class="social-link instagram" title="Instagram"></a>
                        <a href="https://wa.me/5561985103316" class="social-link whatsapp" title="WhatsApp"></a>
                        <a href="https://www.tiktok.com/@cookiesdalu" class="social-link tiktok" title="TikTok"></a>
                        <a href="https://www.facebook.com/cookiesdalu.ofc/" class="social-link facebook" title="Facebook"></a>
                        <a href="https://www.youtube.com/@COOKIESDALU" class="social-link youtube" title="YouTube"></a>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Cookies da Lu. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const animation = entry.target.dataset.animation;
                        entry.target.classList.add(`animate-${animation}`);
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            const animatedElements = document.querySelectorAll('.observe-animation');
            animatedElements.forEach(el => observer.observe(el));
        });
    </script>

</body>

</html>
